<body>

    <!-- AÇILIŞ ANİMASYONU EKRANI -->
    <div id="loader">
        <img src="image_d8765c.png" alt="Baran Core Yükleniyor" class="loader-logo">
    </div>

    <nav>
        <div class="nav-sol">

    <div class="container">

            <div style="font-size: 1.2em; line-height: 2.5; margin-top: 30px;">
                <!-- Telefon -->
                <p>
                    <i class="fa-solid fa-phone" style="width: 35px; color: var(--mavi-vurgu); text-align: center;"></i>

                    <span style="color: var(--metin-soluk);">0501 105 09 77</span>
                </p>

                <p>
                    <i class="fa-solid fa-envelope" style="width: 35px; color: var(--mavi-vurgu); text-align: center;"></i>
                    <strong data-dil="eposta" style="display: inline-block; width: 110px;">E-Posta:</strong> 
                    <a href="mailto:iletisim@barancore.com" style="color: var(--metin-soluk); text-decoration: none; transition: color 0.2s;">iletisim@barancore.com</a>
                </p>
                
                <!-- Instagram -->
                <p>
                    <i class="fa-brands fa-instagram" style="width: 35px; color: #E1306C; text-align: center;"></i>

                    <a href="https://www.instagram.com/emirbar4n/" target="_blank" style="color: var(--metin-soluk); text-decoration: none; transition: color 0.2s;" onmouseover="this.style.color='#E1306C'" onmouseout="this.style.color='var(--metin-soluk)'">@emirbar4n</a>

                    <strong style="display: inline-block; width: 110px;">LinkedIn:</strong> 
                    <a href="https://www.linkedin.com/in/muhammed-emir-baran-339939253/" target="_blank" style="color: var(--metin-soluk); text-decoration: none; transition: color 0.2s;" onmouseover="this.style.color='#0077b5'" onmouseout="this.style.color='var(--metin-soluk)'">Muhammed Emir Baran</a>
                </p>

                <!-- GitHub -->
                <p>
                    <i class="fa-brands fa-github" style="width: 35px; color: var(--metin); text-align: center;"></i>
                    <strong style="display: inline-block; width: 110px;">GitHub:</strong> 
                    <a href="https://github.com/emirbaranm" target="_blank" style="color: var(--metin-soluk); text-decoration: none; transition: color 0.2s;" onmouseover="this.style.color='var(--metin)'" onmouseout="this.style.color='var(--metin-soluk)'">emirbaranm</a>
